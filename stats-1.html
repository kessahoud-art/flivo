<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flivo — Statistiques</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff6b2b">
<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0f0f12; --card:#18181f; --border:#2a2a36;
    --orange:#ff6b2b; --orange-soft:rgba(255,107,43,0.12);
    --green:#22c55e; --green-soft:rgba(34,197,94,0.1);
    --red:#ef4444; --red-soft:rgba(239,68,68,0.1);
    --blue:#3b82f6; --yellow:#f59e0b;
    --text:#f0ede8; --muted:#7a7890; --radius:16px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; overflow-x:hidden; }
  body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; padding:0 0 90px; }

  .topbar { display:flex; align-items:center; justify-content:space-between; padding:18px 16px 0; }
  .back-btn { display:flex; align-items:center; gap:6px; color:var(--muted); font-size:0.82rem; text-decoration:none; background:var(--card); border:1px solid var(--border); padding:7px 13px; border-radius:30px; }
  .back-btn:hover { color:var(--orange); border-color:var(--orange); }
  .logo { font-family:'Syne',sans-serif; font-weight:800; font-size:1.05rem; color:var(--orange); }

  .page-content { width:100%; max-width:480px; margin:0 auto; padding:0 16px; }
  .page-title { font-family:'Syne',sans-serif; font-size:1.3rem; font-weight:800; margin-top:20px; }
  .page-sub { font-size:0.78rem; color:var(--muted); margin-top:4px; margin-bottom:20px; }

  /* Big stats */
  .big-stats { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:12px; }
  .big-stat { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:18px 14px; }
  .big-stat.full { grid-column:1/-1; }
  .bs-val { font-family:'Syne',sans-serif; font-size:2rem; font-weight:900; margin-bottom:4px; }
  .bs-val.orange { color:var(--orange); }
  .bs-val.green  { color:var(--green); }
  .bs-val.blue   { color:var(--blue); }
  .bs-val.yellow { color:var(--yellow); }
  .bs-label { font-size:0.72rem; color:var(--muted); }

  /* Taux de succès */
  .taux-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:16px; margin-bottom:12px; }
  .taux-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
  .taux-title { font-family:'Syne',sans-serif; font-size:0.88rem; font-weight:700; }
  .taux-pct { font-family:'Syne',sans-serif; font-size:1.2rem; font-weight:800; color:var(--green); }
  .taux-bar { height:8px; background:var(--border); border-radius:10px; overflow:hidden; }
  .taux-fill { height:100%; border-radius:10px; transition:width 0.8s ease; }

  /* Section label */
  .section-label { font-size:0.65rem; text-transform:uppercase; letter-spacing:0.1em; color:var(--muted); margin:16px 0 10px; }

  /* Répartition statuts */
  .statuts-grid { display:flex; flex-direction:column; gap:8px; margin-bottom:12px; }
  .statut-row { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:12px 14px; display:flex; align-items:center; gap:12px; }
  .statut-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
  .statut-info { flex:1; }
  .statut-name { font-size:0.82rem; font-weight:500; margin-bottom:2px; }
  .statut-bar-wrap { height:4px; background:var(--border); border-radius:10px; overflow:hidden; }
  .statut-bar-fill { height:100%; border-radius:10px; }
  .statut-count { font-family:'Syne',sans-serif; font-size:0.88rem; font-weight:700; flex-shrink:0; }

  /* Top livreurs */
  .livreur-row { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:12px 14px; display:flex; align-items:center; gap:10px; margin-bottom:8px; }
  .lv-rank { font-family:'Syne',sans-serif; font-size:0.85rem; font-weight:800; color:var(--orange); width:20px; text-align:center; flex-shrink:0; }
  .lv-avatar { width:34px; height:34px; border-radius:50%; background:linear-gradient(135deg,#ff6b2b,#ff9a3c); display:flex; align-items:center; justify-content:center; font-size:0.9rem; flex-shrink:0; }
  .lv-info { flex:1; min-width:0; }
  .lv-nom { font-size:0.85rem; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .lv-livraisons { font-size:0.7rem; color:var(--muted); }
  .lv-badge { font-size:0.68rem; font-weight:600; padding:3px 8px; border-radius:20px; background:var(--green-soft); color:var(--green); flex-shrink:0; }

  /* Revenus estimés */
  .revenus-card { background:linear-gradient(135deg, rgba(255,107,43,0.15), rgba(255,107,43,0.05)); border:1px solid rgba(255,107,43,0.2); border-radius:var(--radius); padding:18px; }
  .rev-title { font-family:'Syne',sans-serif; font-size:0.88rem; font-weight:700; margin-bottom:4px; }
  .rev-sub { font-size:0.72rem; color:var(--muted); margin-bottom:14px; }
  .rev-row { display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid rgba(255,107,43,0.1); }
  .rev-row:last-child { border-bottom:none; padding-bottom:0; }
  .rev-label { font-size:0.78rem; color:var(--muted); }
  .rev-val { font-family:'Syne',sans-serif; font-size:0.9rem; font-weight:700; color:var(--orange); }

  /* Export CSV */
  .export-btn {
    display:flex; align-items:center; justify-content:center; gap:8px;
    width:100%; padding:13px; background:var(--green-soft);
    border:1px solid rgba(34,197,94,0.25); border-radius:12px;
    color:var(--green); font-family:'Syne',sans-serif; font-weight:700;
    font-size:0.85rem; cursor:pointer; margin-bottom:14px; transition:all 0.2s;
  }
  .export-btn:hover { background:rgba(34,197,94,0.18); }
  .export-btn.locked { background:rgba(122,120,144,0.08); border-color:var(--border); color:var(--muted); cursor:default; }

  .loading { display:flex; align-items:center; justify-content:center; padding:60px; }
  .spinner { width:24px; height:24px; border:3px solid var(--border); border-top-color:var(--orange); border-radius:50%; animation:spin 0.8s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg)} }

  .bottom-nav { position:fixed; bottom:0; left:0; right:0; background:var(--card); border-top:1px solid var(--border); display:flex; align-items:center; justify-content:space-around; padding:10px 0 20px; z-index:10; }
  .nav-btn { display:flex; flex-direction:column; align-items:center; gap:3px; font-size:0.62rem; color:var(--muted); text-decoration:none; cursor:pointer; background:none; border:none; font-family:'DM Sans',sans-serif; padding:0 16px; }
  .nav-btn.active { color:var(--orange); }
  .nav-icon { font-size:1.2rem; }
</style>
</head>
<body>

<div class="topbar">
  <a class="back-btn" href="dashboard.html">← Retour</a>
  <div class="logo" id="appName">Flivo</div>
</div>

<div class="page-content">
  <div class="page-title">Statistiques</div>
  <div class="page-sub" id="pageSub">Chargement...</div>
  <div id="app"><div class="loading"><div class="spinner"></div></div></div>
</div>

<div class="bottom-nav">
  <a class="nav-btn" href="dashboard.html"><div class="nav-icon">📦</div>Livraisons</a>
  <a class="nav-btn" href="nouvelle-livraison.html"><div class="nav-icon">➕</div>Nouveau</a>
  <div class="nav-btn active"><div class="nav-icon">📊</div>Stats</div>
</div>

<script>
const sb = window.supabase.createClient(FLIVO_CONFIG.supabase_url, FLIVO_CONFIG.supabase_anon_key)
document.getElementById('appName').textContent = FLIVO_CONFIG.app_name

const COULEURS = ['#7a7890','#f59e0b','#ff6b2b','#22c55e','#ef4444']
const LABELS   = ['En attente','Prêt','En route','Livré ✓','Échec']

let _token = null
let _plan  = 'free'

async function init() {
  const { data } = await sb.auth.getSession()
  if (!data.session) { window.location.href = 'login.html'; return }
  _token = data.session.access_token

  const [resLiv, resLiv2, resQuota] = await Promise.all([
    fetch('/api/get-livraisons', { headers: { 'Authorization': 'Bearer ' + _token } }),
    fetch('/api/get-livreurs',   { headers: { 'Authorization': 'Bearer ' + _token } }),
    fetch('/api/check-quota',    { headers: { 'Authorization': 'Bearer ' + _token } })
  ])
  const { livraisons } = await resLiv.json()
  const { livreurs }   = await resLiv2.json()
  const quota          = await resQuota.json()
  _plan = quota?.plan || 'free'

  render(livraisons || [], livreurs || [])
}

async function exporterCSV() {
  const res = await fetch('/api/export-csv', {
    headers: { 'Authorization': 'Bearer ' + _token }
  })
  if (!res.ok) {
    const data = await res.json()
    if (data.error === 'plan_insuffisant') {
      window.location.href = 'upgrade.html'
      return
    }
    alert('Erreur export : ' + data.error)
    return
  }
  // Télécharger le fichier CSV
  const blob = await res.blob()
  const url  = URL.createObjectURL(blob)
  const a    = document.createElement('a')
  a.href     = url
  a.download = `flivo-livraisons-${new Date().toISOString().split('T')[0]}.csv`
  a.click()
  URL.revokeObjectURL(url)
}

function render(livraisons, livreurs) {
  const total    = livraisons.length
  const livrees  = livraisons.filter(l => l.statut === 3).length
  const enRoute  = livraisons.filter(l => l.statut === 2).length
  const echecs   = livraisons.filter(l => l.statut === 4).length
  const enAttente= livraisons.filter(l => l.statut <= 1).length
  const tauxSucces = total > 0 ? Math.round((livrees / total) * 100) : 0

  const montantTotal = livraisons
    .filter(l => l.statut === 3)
    .reduce((sum, l) => sum + (l.montant || 0), 0)

  // Mois actuel
  const now = new Date()
  const moisNom = now.toLocaleString('fr-FR', { month: 'long', year: 'numeric' })
  const livraisonsMois = livraisons.filter(l => {
    const d = new Date(l.created_at)
    return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear()
  })

  document.getElementById('pageSub').textContent = `Depuis le début · ${moisNom}`

  // Livreurs avec stats
  const livreurStats = {}
  livraisons.forEach(l => {
    if (!livreurStats[l.livreur_nom]) livreurStats[l.livreur_nom] = { total:0, livrees:0 }
    livreurStats[l.livreur_nom].total++
    if (l.statut === 3) livreurStats[l.livreur_nom].livrees++
  })
  const topLivreurs = Object.entries(livreurStats)
    .sort((a,b) => b[1].total - a[1].total)
    .slice(0, 3)

  document.getElementById('app').innerHTML = `

    <!-- Export CSV -->
    ${(_plan === 'pro' || _plan === 'business') ? `
    <button class="export-btn" onclick="exporterCSV()">
      📥 Exporter toutes mes livraisons en CSV
    </button>
    ` : `
    <a href="upgrade.html" class="export-btn locked">
      🔒 Export CSV — Plan Pro requis
    </a>
    `}

    <div class="big-stats">
      <div class="big-stat">
        <div class="bs-val orange">${total}</div>
        <div class="bs-label">Total livraisons</div>
      </div>
      <div class="big-stat">
        <div class="bs-val green">${livrees}</div>
        <div class="bs-label">Livrées avec succès</div>
      </div>
      <div class="big-stat">
        <div class="bs-val blue">${livraisonsMois.length}</div>
        <div class="bs-label">Ce mois-ci</div>
      </div>
      <div class="big-stat">
        <div class="bs-val yellow">${echecs}</div>
        <div class="bs-label">Échecs</div>
      </div>
    </div>

    <!-- Taux de succès -->
    <div class="taux-card">
      <div class="taux-header">
        <div class="taux-title">Taux de succès</div>
        <div class="taux-pct">${tauxSucces}%</div>
      </div>
      <div class="taux-bar">
        <div class="taux-fill" style="width:${tauxSucces}%;background:${tauxSucces>=80?'#22c55e':tauxSucces>=50?'#f59e0b':'#ef4444'}"></div>
      </div>
    </div>

    <!-- Répartition -->
    <div class="section-label">Répartition par statut</div>
    <div class="statuts-grid">
      ${[
        { statut:3, label:'Livrées',   count:livrees,   color:'#22c55e' },
        { statut:2, label:'En route',  count:enRoute,   color:'#ff6b2b' },
        { statut:4, label:'Échecs',    count:echecs,    color:'#ef4444' },
        { statut:0, label:'En attente',count:enAttente, color:'#7a7890' },
      ].map(s => `
        <div class="statut-row">
          <div class="statut-dot" style="background:${s.color}"></div>
          <div class="statut-info">
            <div class="statut-name">${s.label}</div>
            <div class="statut-bar-wrap">
              <div class="statut-bar-fill" style="width:${total>0?Math.round((s.count/total)*100):0}%;background:${s.color}"></div>
            </div>
          </div>
          <div class="statut-count">${s.count}</div>
        </div>
      `).join('')}
    </div>

    <!-- Top livreurs -->
    ${topLivreurs.length > 0 ? `
    <div class="section-label">Top livreurs</div>
    ${topLivreurs.map(([nom, stats], i) => `
      <div class="livreur-row">
        <div class="lv-rank">#${i+1}</div>
        <div class="lv-avatar">🧑🏾</div>
        <div class="lv-info">
          <div class="lv-nom">${nom}</div>
          <div class="lv-livraisons">${stats.total} livraison${stats.total!==1?'s':''}</div>
        </div>
        <div class="lv-badge">${stats.total>0?Math.round((stats.livrees/stats.total)*100):0}% succès</div>
      </div>
    `).join('')}
    ` : ''}

    <!-- Revenus estimés -->
    <div class="section-label">Montants encaissés (livraisons payées)</div>
    <div class="revenus-card">
      <div class="rev-title">💵 Montant total des livraisons effectuées</div>
      <div class="rev-sub">Somme des montants des livraisons avec statut "Livré"</div>
      <div class="rev-row">
        <div class="rev-label">Ce mois-ci</div>
        <div class="rev-val">${livraisonsMois.filter(l=>l.statut===3).reduce((s,l)=>s+(l.montant||0),0).toLocaleString('fr-FR')} FCFA</div>
      </div>
      <div class="rev-row">
        <div class="rev-label">Total cumulé</div>
        <div class="rev-val">${montantTotal.toLocaleString('fr-FR')} FCFA</div>
      </div>
      <div class="rev-row">
        <div class="rev-label">Livraison moyenne</div>
        <div class="rev-val">${livrees>0?Math.round(montantTotal/livrees).toLocaleString('fr-FR'):0} FCFA</div>
      </div>
    </div>
  `
}

init()
</script>
</body>
</html>
