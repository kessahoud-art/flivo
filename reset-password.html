<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flivo — Mot de passe oublié</title>
<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root { --bg:#f8f7f4; --white:#fff; --orange:#ff5c1a; --orange-soft:rgba(255,92,26,0.08); --orange-border:rgba(255,92,26,0.2); --green:#16a34a; --green-soft:#f0fdf4; --red:#dc2626; --border:#e5e2da; --text:#1a1814; --muted:#6b6860; --radius:14px; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px; }
  .logo { font-family:'Syne',sans-serif; font-weight:900; font-size:2rem; color:var(--orange); margin-bottom:4px; }
  .sub { font-size:0.78rem; color:var(--muted); margin-bottom:28px; }
  .card { width:100%; max-width:380px; background:var(--white); border:1px solid var(--border); border-radius:var(--radius); padding:26px; box-shadow:0 2px 12px rgba(0,0,0,0.06); }
  .card-title { font-family:'Syne',sans-serif; font-size:1.1rem; font-weight:800; margin-bottom:4px; }
  .card-sub { font-size:0.76rem; color:var(--muted); margin-bottom:20px; line-height:1.5; }
  .field { margin-bottom:13px; }
  .field label { display:block; font-size:0.65rem; text-transform:uppercase; letter-spacing:0.08em; color:var(--muted); margin-bottom:5px; font-weight:600; }
  .field input { width:100%; background:var(--bg); border:1.5px solid var(--border); border-radius:10px; padding:12px 13px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:0.86rem; outline:none; transition:border-color 0.2s; }
  .field input:focus { border-color:var(--orange); background:var(--white); }
  .submit-btn { width:100%; padding:14px; background:var(--orange); border:none; border-radius:11px; color:#fff; font-family:'Syne',sans-serif; font-weight:700; font-size:0.9rem; cursor:pointer; transition:all 0.2s; box-shadow:0 4px 14px rgba(255,92,26,0.2); margin-top:4px; }
  .submit-btn:hover { opacity:0.92; }
  .submit-btn:disabled { opacity:0.5; pointer-events:none; }
  .msg { margin-top:12px; padding:10px 13px; border-radius:9px; font-size:0.76rem; display:none; }
  .msg.error   { background:#fef2f2; border:1px solid rgba(220,38,38,0.2); color:var(--red); display:block; }
  .msg.success { background:var(--green-soft); border:1px solid rgba(22,163,74,0.2); color:var(--green); display:block; }
  .back-link { display:block; text-align:center; margin-top:14px; font-size:0.76rem; color:var(--muted); text-decoration:none; }
  .back-link:hover { color:var(--orange); }
</style>
</head>
<body>
<div class="logo" id="appName">Flivo</div>
<div class="sub">Réinitialise ton mot de passe</div>

<div class="card" id="cardForgot">
  <div class="card-title">Mot de passe oublié ?</div>
  <div class="card-sub">Entre ton email — on t'envoie un lien de réinitialisation.</div>
  <div class="field"><label>Email</label><input type="email" id="forgotEmail" placeholder="toi@email.com"></div>
  <button class="submit-btn" id="forgotBtn" onclick="envoyerLien()">Envoyer le lien</button>
  <div class="msg" id="forgotMsg"></div>
  <a class="back-link" href="login.html">← Retour à la connexion</a>
</div>

<div class="card" id="cardReset" style="display:none">
  <div class="card-title">Nouveau mot de passe</div>
  <div class="card-sub">Choisis un nouveau mot de passe sécurisé.</div>
  <div class="field"><label>Nouveau mot de passe</label><input type="password" id="newPassword" placeholder="Min. 6 caractères"></div>
  <div class="field"><label>Confirmer</label><input type="password" id="confirmPassword" placeholder="Répète le mot de passe"></div>
  <button class="submit-btn" id="resetBtn" onclick="reinitialiser()">Confirmer le nouveau mot de passe</button>
  <div class="msg" id="resetMsg"></div>
</div>

<script>
const sb = window.supabase.createClient(FLIVO_CONFIG.supabase_url, FLIVO_CONFIG.supabase_anon_key)
document.getElementById('appName').textContent = FLIVO_CONFIG.app_name

if (window.location.hash.includes('type=recovery')) {
  document.getElementById('cardForgot').style.display = 'none'
  document.getElementById('cardReset').style.display  = 'block'
}

function showMsg(id,msg,type) { const el=document.getElementById(id); el.textContent=msg; el.className='msg '+type }

async function envoyerLien() {
  const email = document.getElementById('forgotEmail').value.trim()
  if (!email) return showMsg('forgotMsg','Entre ton email','error')
  const btn = document.getElementById('forgotBtn'); btn.disabled=true; btn.textContent='Envoi...'
  const { error } = await sb.auth.resetPasswordForEmail(email,{redirectTo:FLIVO_CONFIG.app_url+'/reset-password.html'})
  if (error) { showMsg('forgotMsg','Erreur : '+error.message,'error'); btn.disabled=false; btn.textContent='Envoyer le lien'; return }
  showMsg('forgotMsg','✅ Lien envoyé ! Vérifie ta boîte email (et les spams).','success')
  btn.disabled=false; btn.textContent='Envoyer le lien'
}

async function reinitialiser() {
  const mdp1=document.getElementById('newPassword').value
  const mdp2=document.getElementById('confirmPassword').value
  if (!mdp1||!mdp2) return showMsg('resetMsg','Remplis les deux champs','error')
  if (mdp1.length<6) return showMsg('resetMsg','Min. 6 caractères','error')
  if (mdp1!==mdp2)   return showMsg('resetMsg','Les mots de passe ne correspondent pas','error')
  const btn=document.getElementById('resetBtn'); btn.disabled=true; btn.textContent='Enregistrement...'
  const { error } = await sb.auth.updateUser({password:mdp1})
  if (error) { showMsg('resetMsg','Erreur : '+error.message,'error'); btn.disabled=false; btn.textContent='Confirmer'; return }
  showMsg('resetMsg','✅ Mot de passe mis à jour ! Redirection...','success')
  setTimeout(()=>window.location.href='dashboard.html', 1800)
}
</script>
</body>
</html>
