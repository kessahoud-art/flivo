<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flivo — Mon profil</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff6b2b">
<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0f0f12; --card:#18181f; --border:#2a2a36;
    --orange:#ff6b2b; --orange-soft:rgba(255,107,43,0.12);
    --green:#22c55e; --green-soft:rgba(34,197,94,0.1);
    --red:#ef4444; --red-soft:rgba(239,68,68,0.1);
    --text:#f0ede8; --muted:#7a7890; --radius:16px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; overflow-x:hidden; }
  body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; padding:0 0 90px; }

  .topbar { display:flex; align-items:center; justify-content:space-between; padding:18px 16px 0; }
  .back-btn { display:flex; align-items:center; gap:6px; color:var(--muted); font-size:0.82rem; text-decoration:none; background:var(--card); border:1px solid var(--border); padding:7px 13px; border-radius:30px; }
  .back-btn:hover { color:var(--orange); border-color:var(--orange); }
  .logo { font-family:'Syne',sans-serif; font-weight:800; font-size:1.05rem; color:var(--orange); }

  .page-content { width:100%; max-width:480px; margin:0 auto; padding:0 16px; }

  /* Avatar */
  .avatar-section { display:flex; flex-direction:column; align-items:center; margin:28px 0 24px; }
  .avatar { width:80px; height:80px; border-radius:50%; background:linear-gradient(135deg,#ff6b2b,#ff9a3c); display:flex; align-items:center; justify-content:center; font-size:2.2rem; margin-bottom:10px; }
  .avatar-name { font-family:'Syne',sans-serif; font-size:1.2rem; font-weight:800; }
  .avatar-email { font-size:0.78rem; color:var(--muted); margin-top:2px; }
  .plan-badge { display:inline-flex; margin-top:8px; font-size:0.72rem; font-weight:600; padding:5px 14px; border-radius:30px; background:var(--orange-soft); color:var(--orange); border:1px solid rgba(255,107,43,0.25); }
  .plan-badge.pro { background:var(--green-soft); color:var(--green); border-color:rgba(34,197,94,0.25); }

  /* Sections */
  .section-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:18px; margin-bottom:12px; }
  .section-title { font-family:'Syne',sans-serif; font-size:0.9rem; font-weight:700; margin-bottom:16px; }
  .field { margin-bottom:14px; }
  .field:last-of-type { margin-bottom:0; }
  .field label { display:block; font-size:0.68rem; text-transform:uppercase; letter-spacing:0.08em; color:var(--muted); margin-bottom:6px; }
  .field input { width:100%; background:rgba(255,255,255,0.04); border:1px solid var(--border); border-radius:10px; padding:12px 14px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:0.9rem; outline:none; transition:border-color 0.2s; }
  .field input:focus { border-color:var(--orange); }
  .field input::placeholder { color:var(--muted); }
  .field input:disabled { opacity:0.5; cursor:not-allowed; }
  .save-btn { width:100%; padding:14px; background:var(--orange); border:none; border-radius:12px; color:#fff; font-family:'Syne',sans-serif; font-weight:700; font-size:0.92rem; cursor:pointer; margin-top:14px; transition:opacity 0.2s; }
  .save-btn:hover { opacity:0.9; }
  .save-btn:disabled { opacity:0.5; pointer-events:none; }

  .msg { padding:10px 14px; border-radius:10px; font-size:0.78rem; margin-top:10px; display:none; }
  .msg.error   { background:var(--red-soft); color:var(--red); border:1px solid rgba(239,68,68,0.2); display:block; }
  .msg.success { background:var(--green-soft); color:var(--green); border:1px solid rgba(34,197,94,0.2); display:block; }

  /* Info ligne */
  .info-row { display:flex; align-items:center; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--border); }
  .info-row:last-child { border-bottom:none; padding-bottom:0; }
  .info-label { font-size:0.78rem; color:var(--muted); }
  .info-val { font-size:0.82rem; font-weight:500; }

  /* Liens rapides */
  .quick-links { display:flex; flex-direction:column; gap:8px; margin-bottom:12px; }
  .quick-link { display:flex; align-items:center; gap:12px; background:var(--card); border:1px solid var(--border); border-radius:12px; padding:14px; text-decoration:none; color:var(--text); transition:border-color 0.2s; }
  .quick-link:hover { border-color:var(--orange); }
  .ql-icon { font-size:1.2rem; flex-shrink:0; }
  .ql-label { font-size:0.85rem; font-weight:500; flex:1; }
  .ql-arrow { color:var(--muted); font-size:0.9rem; }

  /* Danger zone */
  .danger-btn { width:100%; padding:13px; background:transparent; border:1px solid rgba(239,68,68,0.3); border-radius:12px; color:var(--red); font-family:'DM Sans',sans-serif; font-size:0.85rem; cursor:pointer; transition:all 0.2s; }
  .danger-btn:hover { background:var(--red-soft); border-color:var(--red); }

  .loading { display:flex; align-items:center; justify-content:center; padding:60px; }
  .spinner { width:24px; height:24px; border:3px solid var(--border); border-top-color:var(--orange); border-radius:50%; animation:spin 0.8s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg)} }

  .bottom-nav { position:fixed; bottom:0; left:0; right:0; background:var(--card); border-top:1px solid var(--border); display:flex; align-items:center; justify-content:space-around; padding:10px 0 20px; z-index:10; }
  .nav-btn { display:flex; flex-direction:column; align-items:center; gap:3px; font-size:0.62rem; color:var(--muted); text-decoration:none; cursor:pointer; background:none; border:none; font-family:'DM Sans',sans-serif; padding:0 16px; }
  .nav-btn.active { color:var(--orange); }
  .nav-icon { font-size:1.2rem; }
</style>
</head>
<body>

<div class="topbar">
  <a class="back-btn" href="dashboard.html">← Retour</a>
  <div class="logo" id="appName">Flivo</div>
</div>

<div class="page-content" id="app">
  <div class="loading"><div class="spinner"></div></div>
</div>

<div class="bottom-nav">
  <a class="nav-btn" href="dashboard.html"><div class="nav-icon">📦</div>Livraisons</a>
  <a class="nav-btn" href="nouvelle-livraison.html"><div class="nav-icon">➕</div>Nouveau</a>
  <div class="nav-btn active"><div class="nav-icon">👤</div>Profil</div>
</div>

<script>
const sb = window.supabase.createClient(FLIVO_CONFIG.supabase_url, FLIVO_CONFIG.supabase_anon_key)
document.getElementById('appName').textContent = FLIVO_CONFIG.app_name

let token = null
let vendeur = null

async function init() {
  const { data } = await sb.auth.getSession()
  if (!data.session) { window.location.href = 'login.html'; return }
  token = data.session.access_token

  const { data: v } = await sb.from('vendeurs').select('*').eq('id', data.session.user.id).single()
  vendeur = v

  render(data.session.user.email)
}

function render(email) {
  const isPro = vendeur?.plan === 'pro' || vendeur?.plan === 'business'
  const expireDate = vendeur?.plan_expire_le
    ? new Date(vendeur.plan_expire_le).toLocaleDateString('fr-FR')
    : null

  document.getElementById('app').innerHTML = `

    <div class="avatar-section">
      <div class="avatar">🏪</div>
      <div class="avatar-name">${vendeur?.nom_boutique || 'Ma boutique'}</div>
      <div class="avatar-email">${email}</div>
      <div class="plan-badge ${isPro ? 'pro' : ''}">${isPro ? '⭐ Plan Pro' : '🆓 Plan Gratuit'}</div>
    </div>

    <!-- Modifier profil -->
    <div class="section-card">
      <div class="section-title">✏️ Modifier mon profil</div>
      <div class="field">
        <label>Nom de ta boutique</label>
        <input type="text" id="inputBoutique" value="${vendeur?.nom_boutique || ''}" placeholder="Awa Fashion">
      </div>
      <div class="field">
        <label>Téléphone WhatsApp</label>
        <input type="tel" id="inputPhone" value="${vendeur?.phone || ''}" placeholder="2290196830775">
      </div>
      <div class="field">
        <label>Email (non modifiable)</label>
        <input type="email" value="${email}" disabled>
      </div>
      <button class="save-btn" id="saveBtn" onclick="sauvegarder()">💾 Sauvegarder les modifications</button>
      <div class="msg" id="profilMsg"></div>
    </div>

    <!-- Infos plan -->
    <div class="section-card">
      <div class="section-title">📋 Mon abonnement</div>
      <div class="info-row">
        <div class="info-label">Plan actuel</div>
        <div class="info-val">${isPro ? '⭐ Pro' : '🆓 Gratuit'}</div>
      </div>
      <div class="info-row">
        <div class="info-label">Livraisons ce mois</div>
        <div class="info-val">${vendeur?.livraisons_ce_mois || 0} / ${isPro ? '∞' : '20'}</div>
      </div>
      ${expireDate ? `
      <div class="info-row">
        <div class="info-label">Plan expire le</div>
        <div class="info-val">${expireDate}</div>
      </div>` : ''}
      ${!isPro ? `
      <a href="upgrade.html" style="display:block;margin-top:12px;padding:12px;background:var(--orange);border-radius:10px;color:#fff;text-align:center;font-family:'Syne',sans-serif;font-weight:700;font-size:0.88rem;text-decoration:none;">
        ⚡ Passer au Pro — 3 500 FCFA/mois
      </a>` : ''}
    </div>

    <!-- Liens rapides -->
    <div class="quick-links">
      <a class="quick-link" href="livreurs.html">
        <div class="ql-icon">🛵</div>
        <div class="ql-label">Mes livreurs enregistrés</div>
        <div class="ql-arrow">›</div>
      </a>
      <a class="quick-link" href="stats.html">
        <div class="ql-icon">📊</div>
        <div class="ql-label">Voir mes statistiques</div>
        <div class="ql-arrow">›</div>
      </a>
      <a class="quick-link" href="mentions-legales.html">
        <div class="ql-icon">📄</div>
        <div class="ql-label">Mentions légales & CGU</div>
        <div class="ql-arrow">›</div>
      </a>
      <a class="quick-link" href="https://wa.me/2290196830775" target="_blank">
        <div class="ql-icon">💬</div>
        <div class="ql-label">Contacter le support</div>
        <div class="ql-arrow">›</div>
      </a>
    </div>

    <!-- Déconnexion -->
    <button class="danger-btn" onclick="logout()">🚪 Se déconnecter</button>
    <div style="height:12px"></div>
  `
}

async function sauvegarder() {
  const boutique = document.getElementById('inputBoutique').value.trim()
  const phone    = document.getElementById('inputPhone').value.trim()
  const msg      = document.getElementById('profilMsg')

  if (!boutique || !phone) {
    msg.textContent = 'Remplis tous les champs'
    msg.className = 'msg error'
    return
  }

  const btn = document.getElementById('saveBtn')
  btn.disabled = true
  btn.textContent = 'Sauvegarde...'

  const res  = await fetch('/api/update-profil', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
    body: JSON.stringify({ nom_boutique: boutique, phone })
  })
  const data = await res.json()

  if (!res.ok) {
    msg.textContent = data.error || 'Erreur'
    msg.className = 'msg error'
  } else {
    msg.textContent = '✅ Profil mis à jour !'
    msg.className = 'msg success'
    vendeur = data.vendeur
  }

  btn.disabled = false
  btn.textContent = '💾 Sauvegarder les modifications'
}

async function logout() {
  await sb.auth.signOut()
  window.location.href = 'login.html'
}

init()
</script>
</body>
</html>
