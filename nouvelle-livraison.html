<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flivo — Nouvelle livraison</title>
<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0f0f12; --card:#18181f; --border:#2a2a36;
    --orange:#ff6b2b; --orange-soft:rgba(255,107,43,0.12);
    --green:#22c55e; --green-soft:rgba(34,197,94,0.1);
    --text:#f0ede8; --muted:#7a7890; --radius:18px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:var(--bg); color:var(--text);
    font-family:'DM Sans',sans-serif;
    min-height:100vh; display:flex; flex-direction:column;
    align-items:center; padding:0 0 48px;
  }
  .topbar {
    width:100%; display:flex; align-items:center;
    justify-content:space-between; padding:20px 22px 0;
  }
  .back-btn {
    display:flex; align-items:center; gap:6px;
    color:var(--muted); font-size:0.82rem; text-decoration:none;
    background:var(--card); border:1px solid var(--border);
    padding:7px 13px; border-radius:30px; transition:all 0.2s;
  }
  .back-btn:hover { color:var(--text); border-color:var(--orange); }
  .logo { font-family:'Syne',sans-serif; font-weight:800; font-size:1.05rem; color:var(--orange); }

  .page-title {
    width:calc(100% - 32px); max-width:420px; margin:24px auto 0;
    font-family:'Syne',sans-serif; font-size:1.35rem; font-weight:800;
  }
  .page-sub { width:calc(100% - 32px); max-width:420px; margin:4px auto 0; font-size:0.8rem; color:var(--muted); }

  .form-card {
    width:calc(100% - 32px); max-width:420px; margin:20px auto 0;
    background:var(--card); border:1px solid var(--border);
    border-radius:var(--radius); padding:22px;
  }
  .section-label {
    font-size:0.68rem; text-transform:uppercase; letter-spacing:0.1em;
    color:var(--muted); margin-bottom:12px;
  }
  .divider { height:1px; background:var(--border); margin:20px 0; }

  .field { margin-bottom:14px; }
  .field:last-child { margin-bottom:0; }
  .field label { display:block; font-size:0.72rem; text-transform:uppercase; letter-spacing:0.08em; color:var(--muted); margin-bottom:6px; }
  .field input, .field textarea {
    width:100%; background:rgba(255,255,255,0.04);
    border:1px solid var(--border); border-radius:10px;
    padding:12px 14px; color:var(--text);
    font-family:'DM Sans',sans-serif; font-size:0.9rem;
    outline:none; transition:border-color 0.2s; resize:none;
  }
  .field input:focus, .field textarea:focus { border-color:var(--orange); }
  .field input::placeholder, .field textarea::placeholder { color:var(--muted); }

  .row2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }

  .submit-btn {
    width:calc(100% - 32px); max-width:420px; margin:16px auto 0;
    display:flex; padding:17px; background:var(--orange); border:none;
    border-radius:14px; color:#fff; font-family:'Syne',sans-serif;
    font-weight:700; font-size:1rem; cursor:pointer;
    align-items:center; justify-content:center; gap:10px;
    transition:opacity 0.2s, transform 0.15s;
  }
  .submit-btn:hover { opacity:0.9; transform:translateY(-1px); }
  .submit-btn:disabled { opacity:0.5; pointer-events:none; }

  /* Modale succès */
  .modal-overlay {
    position:fixed; inset:0; background:rgba(0,0,0,0.7);
    display:flex; align-items:flex-end; justify-content:center;
    z-index:100; opacity:0; pointer-events:none; transition:opacity 0.3s;
  }
  .modal-overlay.show { opacity:1; pointer-events:all; }
  .modal {
    width:100%; max-width:480px; background:var(--card);
    border-radius:24px 24px 0 0; padding:28px 22px 40px;
    border-top:1px solid var(--border);
    transform:translateY(100%); transition:transform 0.35s cubic-bezier(0.34,1.2,0.64,1);
  }
  .modal-overlay.show .modal { transform:translateY(0); }
  .modal-title { font-family:'Syne',sans-serif; font-size:1.2rem; font-weight:800; margin-bottom:6px; }
  .modal-sub { font-size:0.8rem; color:var(--muted); margin-bottom:22px; }
  .modal-code {
    font-family:monospace; font-size:1.1rem; font-weight:700;
    color:var(--orange); background:var(--orange-soft);
    border:1px solid rgba(255,107,43,0.2); border-radius:10px;
    padding:10px 14px; margin-bottom:18px; text-align:center;
  }

  .lien-bloc {
    background:rgba(255,255,255,0.03); border:1px solid var(--border);
    border-radius:12px; padding:14px; margin-bottom:10px;
  }
  .lien-label { font-size:0.68rem; text-transform:uppercase; letter-spacing:0.08em; color:var(--muted); margin-bottom:6px; }
  .lien-url { font-size:0.75rem; color:var(--text); word-break:break-all; margin-bottom:10px; line-height:1.5; }
  .lien-btns { display:flex; gap:8px; }
  .lien-btn {
    flex:1; padding:9px; border-radius:8px; border:1px solid var(--border);
    background:transparent; color:var(--text); font-size:0.75rem;
    font-family:'DM Sans',sans-serif; cursor:pointer; transition:all 0.2s;
    text-align:center; text-decoration:none; display:block;
  }
  .lien-btn:hover { border-color:var(--orange); color:var(--orange); }
  .lien-btn.wa { background:#25D366; border-color:#25D366; color:#fff; }
  .lien-btn.wa:hover { opacity:0.9; }

  .modal-done {
    width:100%; margin-top:6px; padding:15px; background:rgba(255,255,255,0.06);
    border:1px solid var(--border); border-radius:12px;
    color:var(--text); font-family:'Syne',sans-serif; font-weight:600;
    font-size:0.9rem; cursor:pointer; transition:all 0.2s;
  }
  .modal-done:hover { border-color:var(--orange); color:var(--orange); }

  .msg { padding:11px 14px; border-radius:10px; font-size:0.8rem; margin-top:12px; display:none; }
  .msg.error { background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.2); color:#ef4444; display:block; }
</style>
</head>
<body>

<div class="topbar">
  <a class="back-btn" href="dashboard.html">← Retour</a>
  <div class="logo" id="appName">Flivo</div>
</div>

<div class="page-title">Nouvelle livraison</div>
<div class="page-sub">Remplis les infos — les liens seront générés automatiquement</div>

<div class="form-card">
  <!-- Client -->
  <div class="section-label">📦 Infos client</div>
  <div class="field">
    <label>Nom du client</label>
    <input type="text" id="clientNom" placeholder="Aminata Diallo">
  </div>
  <div class="row2">
    <div class="field">
      <label>Téléphone</label>
      <input type="tel" id="clientPhone" placeholder="2250708000000">
    </div>
    <div class="field">
      <label>Montant (FCFA)</label>
      <input type="number" id="montant" placeholder="12500">
    </div>
  </div>
  <div class="field">
    <label>Adresse de livraison</label>
    <textarea id="adresse" rows="2" placeholder="Cocody Riviera 3, près du carrefour Shell..."></textarea>
  </div>

  <div class="divider"></div>

  <!-- Livreur -->
  <div class="section-label">🛵 Infos livreur</div>
  <div class="row2">
    <div class="field">
      <label>Nom du livreur</label>
      <input type="text" id="livreurNom" placeholder="Moussa Koné">
    </div>
    <div class="field">
      <label>Téléphone</label>
      <input type="tel" id="livreurPhone" placeholder="2250709000000">
    </div>
  </div>

  <div class="msg" id="formMsg"></div>
</div>

<button class="submit-btn" id="submitBtn" onclick="creerLivraison()">
  🚀 Créer la livraison
</button>

<!-- Modale succès -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title">✅ Livraison créée !</div>
    <div class="modal-sub">Envoie les liens à ton client et ton livreur sur WhatsApp</div>
    <div class="modal-code" id="modalCode"></div>

    <div class="lien-bloc">
      <div class="lien-label">🔗 Lien client (à envoyer à Aminata)</div>
      <div class="lien-url" id="lienClient"></div>
      <div class="lien-btns">
        <button class="lien-btn" onclick="copier('client')">📋 Copier</button>
        <a class="lien-btn wa" id="waClient" href="#" target="_blank">💬 WhatsApp</a>
      </div>
    </div>

    <div class="lien-bloc">
      <div class="lien-label">🛵 Lien livreur (à envoyer à Moussa)</div>
      <div class="lien-url" id="lienLivreur"></div>
      <div class="lien-btns">
        <button class="lien-btn" onclick="copier('livreur')">📋 Copier</button>
        <a class="lien-btn wa" id="waLivreur" href="#" target="_blank">💬 WhatsApp</a>
      </div>
    </div>

    <button class="modal-done" onclick="fermerModal()">Voir toutes mes livraisons →</button>
  </div>
</div>

<script>
const sb = window.supabase.createClient(FLIVO_CONFIG.supabase_url, FLIVO_CONFIG.supabase_anon_key)
document.getElementById('appName').textContent = FLIVO_CONFIG.app_name

let token = null
let liensData = {}

// Vérifier session
sb.auth.getSession().then(({ data }) => {
  if (!data.session) { window.location.href = 'login.html'; return }
  token = data.session.access_token
})

function showMsg(msg) {
  const el = document.getElementById('formMsg')
  el.textContent = msg
  el.className = 'msg error'
}

async function creerLivraison() {
  const clientNom    = document.getElementById('clientNom').value.trim()
  const clientPhone  = document.getElementById('clientPhone').value.trim()
  const montant      = document.getElementById('montant').value.trim()
  const adresse      = document.getElementById('adresse').value.trim()
  const livreurNom   = document.getElementById('livreurNom').value.trim()
  const livreurPhone = document.getElementById('livreurPhone').value.trim()

  if (!clientNom || !clientPhone || !montant || !adresse || !livreurNom || !livreurPhone) {
    return showMsg('Remplis tous les champs avant de continuer')
  }

  const btn = document.getElementById('submitBtn')
  btn.disabled = true
  btn.textContent = 'Création en cours...'

  try {
    const res = await fetch('/api/create-livraison', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + token
      },
      body: JSON.stringify({ client_nom: clientNom, client_phone: clientPhone, montant, adresse, livreur_nom: livreurNom, livreur_phone: livreurPhone })
    })

    const data = await res.json()

    if (!res.ok) {
      if (data.error === 'quota_atteint') {
        showMsg('🚫 ' + data.message)
      } else {
        showMsg('Erreur : ' + (data.error || 'réessaie'))
      }
      btn.disabled = false
      btn.textContent = '🚀 Créer la livraison'
      return
    }

    // Afficher la modale
    liensData = data.liens
    document.getElementById('modalCode').textContent = '#' + data.livraison.code
    document.getElementById('lienClient').textContent  = data.liens.client
    document.getElementById('lienLivreur').textContent = data.liens.livreur

    const msgClient  = encodeURIComponent(`Bonjour ${clientNom} 👋\nVotre commande est confirmée.\nSuivez votre livraison ici 👇\n${data.liens.client}\nLivreur : ${livreurNom} — ${livreurPhone}`)
    const msgLivreur = encodeURIComponent(`Bonjour ${livreurNom} 👋\nNouvelle livraison pour toi.\nClient : ${clientNom} — ${adresse}\nMontant à encaisser : ${montant} FCFA\nGère la livraison ici 👇\n${data.liens.livreur}`)

    document.getElementById('waClient').href  = `https://wa.me/${clientPhone}?text=${msgClient}`
    document.getElementById('waLivreur').href = `https://wa.me/${livreurPhone}?text=${msgLivreur}`

    document.getElementById('modalOverlay').classList.add('show')

  } catch (err) {
    showMsg('Erreur réseau — réessaie')
    btn.disabled = false
    btn.textContent = '🚀 Créer la livraison'
  }
}

function copier(type) {
  const lien = type === 'client' ? liensData.client : liensData.livreur
  navigator.clipboard.writeText(lien).then(() => {
    alert('Lien copié !')
  }).catch(() => {
    prompt('Copie ce lien :', lien)
  })
}

function fermerModal() {
  document.getElementById('modalOverlay').classList.remove('show')
  window.location.href = 'dashboard.html'
}
</script>
</body>
</html>
