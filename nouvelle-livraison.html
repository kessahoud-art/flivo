<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flivo — Nouvelle livraison</title>
<link rel="manifest" href="manifest.json">
<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#f8f7f4; --white:#ffffff; --orange:#ff5c1a;
    --orange-soft:rgba(255,92,26,0.08); --orange-border:rgba(255,92,26,0.2);
    --green:#16a34a; --green-soft:#f0fdf4;
    --red:#dc2626; --border:#e5e2da; --text:#1a1814; --muted:#6b6860; --radius:14px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:100%; overflow-x:hidden; }
  body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; padding:0 0 48px; }

  .topbar { display:flex; align-items:center; justify-content:space-between; padding:14px 16px; background:var(--white); border-bottom:1px solid var(--border); }
  .back-btn { display:flex; align-items:center; gap:5px; color:var(--muted); font-size:0.8rem; text-decoration:none; }
  .back-btn:hover { color:var(--orange); }
  .logo { font-family:'Syne',sans-serif; font-weight:900; font-size:1.05rem; color:var(--orange); }

  .page-content { width:100%; max-width:480px; margin:0 auto; padding:0 14px; }
  .page-title { font-family:'Syne',sans-serif; font-size:1.2rem; font-weight:800; margin-top:18px; }
  .page-sub { font-size:0.76rem; color:var(--muted); margin-top:3px; margin-bottom:16px; }

  .form-card { background:var(--white); border:1px solid var(--border); border-radius:var(--radius); padding:18px; margin-bottom:10px; box-shadow:0 1px 5px rgba(0,0,0,0.04); }
  .section-label { font-size:0.65rem; text-transform:uppercase; letter-spacing:0.08em; color:var(--muted); margin-bottom:12px; font-weight:700; }
  .divider { height:1px; background:var(--border); margin:14px 0; }
  .field { margin-bottom:11px; }
  .field:last-child { margin-bottom:0; }
  .field label { display:block; font-size:0.65rem; text-transform:uppercase; letter-spacing:0.08em; color:var(--muted); margin-bottom:5px; font-weight:600; }
  .field input, .field textarea { width:100%; background:var(--bg); border:1.5px solid var(--border); border-radius:10px; padding:11px 12px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:0.86rem; outline:none; transition:border-color 0.2s; resize:none; }
  .field input:focus, .field textarea:focus { border-color:var(--orange); background:var(--white); }
  .field input::placeholder, .field textarea::placeholder { color:var(--muted); }
  .row2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }

  /* Livreurs chips */
  .chips-label { font-size:0.65rem; text-transform:uppercase; letter-spacing:0.08em; color:var(--muted); margin-bottom:8px; font-weight:600; }
  .chips-scroll { display:flex; gap:7px; overflow-x:auto; margin-bottom:11px; scrollbar-width:none; -webkit-overflow-scrolling:touch; }
  .chips-scroll::-webkit-scrollbar { display:none; }
  .chip { flex-shrink:0; display:flex; align-items:center; gap:5px; background:var(--bg); border:1.5px solid var(--border); border-radius:20px; padding:6px 12px; cursor:pointer; transition:all 0.2s; font-size:0.76rem; font-weight:500; }
  .chip:hover { border-color:var(--orange); color:var(--orange); }
  .chip.selected { background:var(--orange-soft); border-color:var(--orange); color:var(--orange); font-weight:700; }
  .no-livreurs { font-size:0.74rem; color:var(--muted); margin-bottom:10px; }
  .no-livreurs a { color:var(--orange); text-decoration:none; }

  .submit-btn { width:100%; padding:15px; background:var(--orange); border:none; border-radius:var(--radius); color:#fff; font-family:'Syne',sans-serif; font-weight:700; font-size:0.92rem; cursor:pointer; transition:all 0.2s; box-shadow:0 4px 14px rgba(255,92,26,0.2); }
  .submit-btn:hover { opacity:0.92; transform:translateY(-1px); }
  .submit-btn:disabled { opacity:0.5; pointer-events:none; }

  .msg { padding:10px 12px; border-radius:10px; font-size:0.76rem; margin-top:10px; display:none; }
  .msg.error { background:#fef2f2; border:1px solid rgba(220,38,38,0.2); color:var(--red); display:block; }

  /* Modal succès */
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.5); display:flex; align-items:flex-end; justify-content:center; z-index:100; opacity:0; pointer-events:none; transition:opacity 0.3s; }
  .modal-overlay.show { opacity:1; pointer-events:all; }
  .modal { width:100%; max-width:480px; background:var(--white); border-radius:20px 20px 0 0; padding:22px 16px 40px; border-top:1px solid var(--border); transform:translateY(100%); transition:transform 0.35s cubic-bezier(0.34,1.2,0.64,1); }
  .modal-overlay.show .modal { transform:translateY(0); }
  .modal-title { font-family:'Syne',sans-serif; font-size:1.05rem; font-weight:800; margin-bottom:4px; }
  .modal-sub { font-size:0.76rem; color:var(--muted); margin-bottom:16px; }
  .modal-code { font-family:monospace; font-size:0.95rem; font-weight:700; color:var(--orange); background:var(--orange-soft); border:1px solid var(--orange-border); border-radius:9px; padding:9px 13px; margin-bottom:14px; text-align:center; }
  .lien-bloc { background:var(--bg); border:1px solid var(--border); border-radius:11px; padding:12px; margin-bottom:9px; }
  .lien-label { font-size:0.62rem; text-transform:uppercase; letter-spacing:0.08em; color:var(--muted); margin-bottom:5px; font-weight:600; }
  .lien-url { font-size:0.72rem; color:var(--text); word-break:break-all; margin-bottom:9px; line-height:1.4; }
  .lien-btns { display:flex; gap:7px; }
  .lien-btn { flex:1; padding:8px; border-radius:8px; border:1px solid var(--border); background:var(--white); color:var(--text); font-size:0.72rem; cursor:pointer; transition:all 0.2s; text-align:center; text-decoration:none; display:block; font-family:'DM Sans',sans-serif; }
  .lien-btn:hover { border-color:var(--orange); color:var(--orange); }
  .lien-btn.wa { background:#25D366; border-color:#25D366; color:#fff; }
  .modal-done { width:100%; margin-top:6px; padding:13px; background:var(--bg); border:1px solid var(--border); border-radius:11px; color:var(--text); font-family:'Syne',sans-serif; font-weight:700; font-size:0.86rem; cursor:pointer; transition:all 0.2s; }
  .modal-done:hover { border-color:var(--orange); color:var(--orange); }
</style>
</head>
<body>
<div class="topbar">
  <a class="back-btn" href="dashboard.html">← Retour</a>
  <div class="logo" id="appName">Flivo</div>
</div>
<div class="page-content">
  <div class="page-title">Nouvelle livraison</div>
  <div class="page-sub">Remplis les infos — les liens sont générés automatiquement</div>
  <div class="form-card">
    <div class="section-label">📦 Client</div>
    <div class="field"><label>Nom du client</label><input type="text" id="clientNom" placeholder="Aminata Diallo"></div>
    <div class="row2">
      <div class="field"><label>Téléphone</label><input type="tel" id="clientPhone" placeholder="2250708000000"></div>
      <div class="field"><label>Montant (FCFA)</label><input type="number" id="montant" placeholder="12500"></div>
    </div>
    <div class="field"><label>Adresse</label><textarea id="adresse" rows="2" placeholder="Cocody Riviera 3, carrefour Shell..."></textarea></div>
    <div class="divider"></div>
    <div class="section-label">🛵 Livreur</div>
    <div id="livreursChips"></div>
    <div class="row2">
      <div class="field"><label>Nom du livreur</label><input type="text" id="livreurNom" placeholder="Moussa Koné"></div>
      <div class="field"><label>Téléphone</label><input type="tel" id="livreurPhone" placeholder="2250709000000"></div>
    </div>
    <div class="msg" id="formMsg"></div>
  </div>
  <button class="submit-btn" id="submitBtn" onclick="creerLivraison()">🚀 Créer la livraison</button>
</div>

<!-- Modal succès -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title">✅ Livraison créée !</div>
    <div class="modal-sub">Envoie les liens sur WhatsApp</div>
    <div class="modal-code" id="modalCode"></div>
    <div class="lien-bloc">
      <div class="lien-label">🔗 Lien client</div>
      <div class="lien-url" id="lienClient"></div>
      <div class="lien-btns">
        <button class="lien-btn" onclick="copier('client')">📋 Copier</button>
        <a class="lien-btn wa" id="waClient" href="#" target="_blank">💬 WhatsApp</a>
      </div>
    </div>
    <div class="lien-bloc">
      <div class="lien-label">🛵 Lien livreur</div>
      <div class="lien-url" id="lienLivreur"></div>
      <div class="lien-btns">
        <button class="lien-btn" onclick="copier('livreur')">📋 Copier</button>
        <a class="lien-btn wa" id="waLivreur" href="#" target="_blank">💬 WhatsApp</a>
      </div>
    </div>
    <button class="modal-done" onclick="fermerModal()">Voir mes livraisons →</button>
  </div>
</div>

<script>
const sb = window.supabase.createClient(FLIVO_CONFIG.supabase_url, FLIVO_CONFIG.supabase_anon_key)
document.getElementById('appName').textContent = FLIVO_CONFIG.app_name
let token=null, liensData={}

async function init() {
  const { data } = await sb.auth.getSession()
  if (!data.session) { window.location.href='login.html'; return }
  token = data.session.access_token
  chargerLivreurs()
}

async function chargerLivreurs() {
  const res  = await fetch('/api/get-livreurs',{headers:{'Authorization':'Bearer '+token}})
  const data = await res.json()
  const livreurs = data.livreurs||[]
  const el = document.getElementById('livreursChips')
  if (livreurs.length===0) { el.innerHTML=`<p class="no-livreurs">Aucun livreur — <a href="livreurs.html">en ajouter ?</a></p>`; return }
  el.innerHTML=`<div class="chips-label">Livreurs enregistrés</div><div class="chips-scroll">${livreurs.map(l=>`<div class="chip" onclick="selLivreur('${l.nom}','${l.phone}',this)">🛵 ${l.nom}</div>`).join('')}</div>`
}

function selLivreur(nom,phone,el) {
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('selected'))
  el.classList.add('selected')
  document.getElementById('livreurNom').value=nom
  document.getElementById('livreurPhone').value=phone
}

function showMsg(msg) { const el=document.getElementById('formMsg'); el.textContent=msg; el.className='msg error' }

async function creerLivraison() {
  const clientNom   =document.getElementById('clientNom').value.trim()
  const clientPhone =document.getElementById('clientPhone').value.trim()
  const montant     =document.getElementById('montant').value.trim()
  const adresse     =document.getElementById('adresse').value.trim()
  const livreurNom  =document.getElementById('livreurNom').value.trim()
  const livreurPhone=document.getElementById('livreurPhone').value.trim()
  if (!clientNom||!clientPhone||!montant||!adresse||!livreurNom||!livreurPhone) return showMsg('Remplis tous les champs')

  const btn=document.getElementById('submitBtn'); btn.disabled=true; btn.textContent='Création...'
  try {
    const res  = await fetch('/api/create-livraison',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({client_nom:clientNom,client_phone:clientPhone,montant,adresse,livreur_nom:livreurNom,livreur_phone:livreurPhone})})
    const data = await res.json()
    if (!res.ok) {
      if (data.redirect) { window.location.href=data.redirect; return }
      showMsg(data.error||'Erreur — réessaie')
      btn.disabled=false; btn.textContent='🚀 Créer la livraison'; return
    }
    liensData = data.liens
    document.getElementById('modalCode').textContent='#'+data.livraison.code
    document.getElementById('lienClient').textContent=data.liens.client
    document.getElementById('lienLivreur').textContent=data.liens.livreur
    const mC=encodeURIComponent(`Bonjour ${clientNom} 👋\nVotre commande est confirmée.\nSuivez votre livraison ici 👇\n${data.liens.client}\nLivreur : ${livreurNom} — ${livreurPhone}`)
    const mL=encodeURIComponent(`Bonjour ${livreurNom} 👋\nNouvelle livraison #${data.livraison.code}\nClient : ${clientNom}\n${adresse}\nMontant : ${Number(montant).toLocaleString('fr-FR')} FCFA\nGère ici 👇\n${data.liens.livreur}`)
    document.getElementById('waClient').href=`https://wa.me/${clientPhone}?text=${mC}`
    document.getElementById('waLivreur').href=`https://wa.me/${livreurPhone}?text=${mL}`

    // Enregistrer le clic WhatsApp si c'est un upgrade intent
    if (data.avertissement) {
      await fetch('/api/whatsapp-click',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({plan_voulu:'pro'})})
    }

    document.getElementById('modalOverlay').classList.add('show')
  } catch { showMsg('Erreur réseau — réessaie'); btn.disabled=false; btn.textContent='🚀 Créer la livraison' }
}

function copier(type) {
  const lien = type==='client'?liensData.client:liensData.livreur
  navigator.clipboard.writeText(lien).then(()=>alert('Lien copié !')).catch(()=>prompt('Copie ce lien :',lien))
}
function fermerModal() { document.getElementById('modalOverlay').classList.remove('show'); window.location.href='dashboard.html' }
init()
</script>
</body>
</html>
