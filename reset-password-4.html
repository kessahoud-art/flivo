<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flivo — Mot de passe oublié</title>
<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0f0f12; --card:#18181f; --border:#2a2a36;
    --orange:#ff6b2b; --orange-soft:rgba(255,107,43,0.12);
    --green:#22c55e; --green-soft:rgba(34,197,94,0.1);
    --text:#f0ede8; --muted:#7a7890; --radius:18px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:var(--bg); color:var(--text);
    font-family:'DM Sans',sans-serif; min-height:100vh;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center; padding:24px;
  }
  .logo { font-family:'Syne',sans-serif; font-weight:800; font-size:2rem; color:var(--orange); margin-bottom:6px; text-align:center; }
  .tagline { font-size:0.82rem; color:var(--muted); margin-bottom:36px; text-align:center; }
  .card { width:100%; max-width:380px; background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:28px; }
  .card-title { font-family:'Syne',sans-serif; font-size:1.2rem; font-weight:700; margin-bottom:4px; }
  .card-sub { font-size:0.78rem; color:var(--muted); margin-bottom:24px; line-height:1.5; }
  .field { margin-bottom:16px; }
  .field label { display:block; font-size:0.72rem; text-transform:uppercase; letter-spacing:0.08em; color:var(--muted); margin-bottom:6px; }
  .field input { width:100%; background:rgba(255,255,255,0.04); border:1px solid var(--border); border-radius:10px; padding:13px 14px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:0.9rem; outline:none; transition:border-color 0.2s; }
  .field input:focus { border-color:var(--orange); }
  .field input::placeholder { color:var(--muted); }
  .submit-btn { width:100%; padding:15px; background:var(--orange); border:none; border-radius:12px; color:#fff; font-family:'Syne',sans-serif; font-weight:700; font-size:0.95rem; cursor:pointer; transition:opacity 0.2s; margin-top:4px; }
  .submit-btn:hover { opacity:0.9; }
  .submit-btn:disabled { opacity:0.5; pointer-events:none; }
  .msg { margin-top:14px; padding:11px 14px; border-radius:10px; font-size:0.8rem; text-align:center; display:none; }
  .msg.error { background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.2); color:#ef4444; display:block; }
  .msg.success { background:var(--green-soft); border:1px solid rgba(34,197,94,0.2); color:var(--green); display:block; }
  .back-link { display:block; text-align:center; margin-top:18px; font-size:0.78rem; color:var(--muted); text-decoration:none; transition:color 0.2s; }
  .back-link:hover { color:var(--orange); }
  .divider { height:1px; background:var(--border); margin:20px 0; }
</style>
</head>
<body>

<div class="logo" id="appName">Flivo</div>
<div class="tagline">Réinitialise ton mot de passe</div>

<div class="card" id="cardForgot">
  <div class="card-title">Mot de passe oublié ?</div>
  <div class="card-sub">Entre ton email — on t'envoie un lien de réinitialisation.</div>
  <div class="field">
    <label>Email</label>
    <input type="email" id="forgotEmail" placeholder="toi@email.com">
  </div>
  <button class="submit-btn" id="forgotBtn" onclick="envoyerLien()">Envoyer le lien</button>
  <div class="msg" id="forgotMsg"></div>
  <a class="back-link" href="login.html">← Retour à la connexion</a>
</div>

<!-- Formulaire nouveau mot de passe (affiché si token dans URL) -->
<div class="card" id="cardReset" style="display:none">
  <div class="card-title">Nouveau mot de passe</div>
  <div class="card-sub">Choisis un nouveau mot de passe sécurisé.</div>
  <div class="field">
    <label>Nouveau mot de passe</label>
    <input type="password" id="newPassword" placeholder="Min. 6 caractères">
  </div>
  <div class="field">
    <label>Confirmer le mot de passe</label>
    <input type="password" id="confirmPassword" placeholder="Répète le mot de passe">
  </div>
  <button class="submit-btn" id="resetBtn" onclick="reinitialiser()">Confirmer le nouveau mot de passe</button>
  <div class="msg" id="resetMsg"></div>
</div>

<script>
const sb = window.supabase.createClient(FLIVO_CONFIG.supabase_url, FLIVO_CONFIG.supabase_anon_key)
document.getElementById('appName').textContent = FLIVO_CONFIG.app_name

// Détecter si on est en mode réinitialisation (lien depuis l'email)
const hash = window.location.hash
if (hash && hash.includes('type=recovery')) {
  document.getElementById('cardForgot').style.display = 'none'
  document.getElementById('cardReset').style.display = 'block'

  // Supabase gère le token automatiquement via le hash
  sb.auth.onAuthStateChange((event, session) => {
    if (event === 'PASSWORD_RECOVERY') {
      document.getElementById('cardForgot').style.display = 'none'
      document.getElementById('cardReset').style.display = 'block'
    }
  })
}

function showMsg(id, msg, type) {
  const el = document.getElementById(id)
  el.textContent = msg
  el.className = 'msg ' + type
}

async function envoyerLien() {
  const email = document.getElementById('forgotEmail').value.trim()
  if (!email) return showMsg('forgotMsg', 'Entre ton adresse email', 'error')

  const btn = document.getElementById('forgotBtn')
  btn.disabled = true
  btn.textContent = 'Envoi en cours...'

  const { error } = await sb.auth.resetPasswordForEmail(email, {
    redirectTo: FLIVO_CONFIG.app_url + '/reset-password.html'
  })

  if (error) {
    showMsg('forgotMsg', 'Erreur : ' + error.message, 'error')
    btn.disabled = false
    btn.textContent = 'Envoyer le lien'
    return
  }

  showMsg('forgotMsg', '✅ Lien envoyé ! Vérifie ta boîte email (et tes spams).', 'success')
  btn.disabled = false
  btn.textContent = 'Envoyer le lien'
}

async function reinitialiser() {
  const mdp1 = document.getElementById('newPassword').value
  const mdp2 = document.getElementById('confirmPassword').value

  if (!mdp1 || !mdp2) return showMsg('resetMsg', 'Remplis les deux champs', 'error')
  if (mdp1.length < 6) return showMsg('resetMsg', 'Mot de passe trop court (min. 6)', 'error')
  if (mdp1 !== mdp2) return showMsg('resetMsg', 'Les mots de passe ne correspondent pas', 'error')

  const btn = document.getElementById('resetBtn')
  btn.disabled = true
  btn.textContent = 'Enregistrement...'

  const { error } = await sb.auth.updateUser({ password: mdp1 })

  if (error) {
    showMsg('resetMsg', 'Erreur : ' + error.message, 'error')
    btn.disabled = false
    btn.textContent = 'Confirmer le nouveau mot de passe'
    return
  }

  showMsg('resetMsg', '✅ Mot de passe mis à jour ! Redirection...', 'success')
  setTimeout(() => { window.location.href = 'dashboard.html' }, 1800)
}
</script>
</body>
</html>
